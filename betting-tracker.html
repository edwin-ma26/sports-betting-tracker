<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beginner Sports Betting Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }

  header { background: #1a1f2e; border-bottom: 1px solid #2d3748; padding: 20px 32px; display: flex; align-items: center; gap: 16px; }
  header h1 { font-size: 1.5rem; font-weight: 700; color: #fff; }
  header span { font-size: 0.85rem; color: #64748b; }

  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; padding: 24px 32px 0; }
  .stat-card { background: #1a1f2e; border: 1px solid #2d3748; border-radius: 10px; padding: 18px 20px; }
  .stat-card .label { font-size: 0.75rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
  #statsGrid .stat-card .label { min-height: 2.2em; display: flex; align-items: flex-end; }
  .stat-card .value { font-size: 1.5rem; font-weight: 700; }
  .stat-card .value.green { color: #22c55e; }
  .stat-card .value.red { color: #ef4444; }
  .stat-card .value.yellow { color: #f59e0b; }
  .stat-card .value.blue { color: #60a5fa; }
  .stat-card .sub { font-size: 0.72rem; color: #64748b; margin-top: 4px; }

  .table-wrap { padding: 24px 32px 48px; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  thead th { background: #1a1f2e; color: #94a3b8; font-weight: 600; text-transform: uppercase; font-size: 0.72rem; letter-spacing: 0.05em; padding: 12px 14px; text-align: left; border-bottom: 1px solid #2d3748; white-space: nowrap; }
  tbody tr { border-bottom: 1px solid #1e2535; transition: background 0.15s; }
  tbody tr:hover { background: #1a1f2e; }
  tbody td { padding: 11px 14px; vertical-align: middle; }

  .badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
  .badge.won { background: #14532d; color: #4ade80; }
  .badge.lost { background: #450a0a; color: #f87171; }
  .badge.pending { background: #1e3a5f; color: #93c5fd; }
  .badge.push { background: #2d1f00; color: #fbbf24; }

  .site-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.72rem; font-weight: 600; }
  .site-fanduel { background: #1d3461; color: #60a5fa; }
  .site-draftkings { background: #1a2e1a; color: #4ade80; }
  .site-kalshi { background: #2d1f4e; color: #c084fc; }

  .profit.pos { color: #22c55e; font-weight: 600; }
  .profit.neg { color: #ef4444; font-weight: 600; }

  .chance-bar { display: flex; align-items: center; gap: 8px; }
  .bar-bg { background: #1e2535; border-radius: 4px; height: 6px; width: 60px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; }
  .chance-label { font-size: 0.75rem; color: #94a3b8; width: 34px; }

  .bonus-note { font-size: 0.7rem; color: #f59e0b; margin-top: 2px; }

  .section-header { font-size: 0.7rem; color: #f59e0b; text-transform: uppercase; letter-spacing: 0.08em; padding: 8px 14px 4px; background: #12151f; border-bottom: 1px solid #1e2535; }

  .add-btn { display: inline-flex; align-items: center; gap: 6px; background: #3b82f6; color: #fff; border: none; border-radius: 8px; padding: 9px 18px; font-size: 0.85rem; font-weight: 600; cursor: pointer; margin-bottom: 16px; transition: background 0.15s; }
  .add-btn:hover { background: #2563eb; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: #1a1f2e; border: 1px solid #2d3748; border-radius: 12px; padding: 28px; width: 480px; max-width: 95vw; max-height: 90vh; overflow-y: auto; }
  .modal h2 { margin-bottom: 20px; font-size: 1.1rem; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .form-row.full { grid-template-columns: 1fr; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group label { font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.04em; }
  .form-group input, .form-group select { background: #0f1117; border: 1px solid #2d3748; color: #e2e8f0; border-radius: 6px; padding: 8px 10px; font-size: 0.85rem; }
  .form-group input:focus, .form-group select:focus { outline: none; border-color: #3b82f6; }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
  .btn-cancel { background: #2d3748; color: #e2e8f0; border: none; border-radius: 6px; padding: 8px 16px; cursor: pointer; font-size: 0.85rem; }
  .btn-save { background: #3b82f6; color: #fff; border: none; border-radius: 6px; padding: 8px 16px; cursor: pointer; font-size: 0.85rem; font-weight: 600; }

  .delete-btn { background: none; border: none; color: #475569; cursor: pointer; font-size: 1rem; padding: 2px 6px; border-radius: 4px; }
  .delete-btn:hover { color: #ef4444; background: #450a0a22; }
  .edit-btn { background: none; border: none; color: #475569; cursor: pointer; font-size: 1rem; padding: 2px 6px; border-radius: 4px; }
  .edit-btn:hover { color: #60a5fa; background: #1d346122; }

  .wager-cell { white-space: nowrap; }
  .wager-bonus { font-size: 0.68rem; color: #f59e0b; display: block; }

  .roi-explainer { background: #1a1f2e; border: 1px solid #2d3748; border-radius: 8px; padding: 14px 20px; margin: 0 32px 0; font-size: 0.78rem; color: #94a3b8; line-height: 1.6; }
  .roi-explainer strong { color: #e2e8f0; }

  .section-label { padding: 20px 32px 0 32px; font-size: 0.72rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.06em; }
  .txn-type { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.72rem; font-weight: 600; }
  .txn-deposit { background: #14532d; color: #4ade80; }
  .txn-withdrawal { background: #450a0a; color: #f87171; }
  .txn-bonus { background: #2d1f00; color: #fbbf24; }
  .balance-pill { display: inline-block; font-size: 0.8rem; font-weight: 700; padding: 2px 10px; border-radius: 20px; }
  .balance-pos { background: #14532d33; color: #4ade80; }
  .balance-neg { background: #450a0a33; color: #f87171; }
  .add-btn-sm { display: inline-flex; align-items: center; gap: 6px; background: #1e2535; color: #94a3b8; border: 1px solid #2d3748; border-radius: 8px; padding: 7px 14px; font-size: 0.8rem; font-weight: 600; cursor: pointer; margin-bottom: 12px; transition: background 0.15s; }
  .add-btn-sm:hover { background: #2d3748; color: #e2e8f0; }
</style>
</head>
<body>

<header>
  <div>
    <h1>⚽ Beginner Sports Betting Tracker</h1>
    <span>2026 FIFA World Cup &amp; more</span>
  </div>
</header>

<div class="stats-grid" id="statsGrid"></div>

<div style="padding: 12px 32px 0 32px; font-size: 0.72rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.06em;">P&amp;L by Site</div>
<div class="stats-grid" id="siteGrid"></div>

<div style="padding: 16px 32px 8px;">
  <div class="roi-explainer" id="roiExplainer"></div>
</div>

<div class="section-label">Account Transactions</div>
<div class="table-wrap" style="padding-bottom: 0;">
  <button class="add-btn-sm" onclick="openTxnModal()">+ Deposit / Withdrawal / Bonus</button>
  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>Site</th>
        <th>Type</th>
        <th>Amount</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="txnBody"></tbody>
  </table>
</div>

<div class="section-label" style="padding-top: 24px;">Bet History</div>
<div class="table-wrap">
  <button class="add-btn" onclick="openModal()">+ Add Bet</button>
  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>Site</th>
        <th>Event</th>
        <th>Bet Type</th>
        <th>Wager</th>
        <th>Payout</th>
        <th>Status</th>
        <th>Net Profit</th>
        <th>Odds</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="betsBody"></tbody>
  </table>
</div>

<!-- Transaction Modal -->
<div class="modal-overlay" id="txnModalOverlay">
  <div class="modal">
    <h2 id="txnModalTitle">Add Transaction</h2>
    <div class="form-row">
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="t-date" />
      </div>
      <div class="form-group">
        <label>Site</label>
        <select id="t-site" onchange="updateTxnAmountUI()">
          <option>FanDuel</option>
          <option>DraftKings</option>
          <option>Kalshi</option>
          <option>Other</option>
        </select>
      </div>
    </div>
    <div class="form-row full">
      <div class="form-group">
        <label>Type</label>
        <select id="t-type" onchange="updateTxnAmountUI()">
          <option value="deposit">Deposit</option>
          <option value="withdrawal">Withdrawal</option>
          <option value="bonus">Bonus Credit</option>
        </select>
      </div>
    </div>
    <!-- Withdrawal: percentage mode -->
    <div id="t-pct-row" style="display:none">
      <div class="form-row" style="align-items:flex-end">
        <div class="form-group">
          <label>Withdraw %</label>
          <input type="number" id="t-pct" min="1" max="100" step="1" placeholder="e.g. 50" oninput="updatePctPreview()" />
        </div>
        <div class="form-group">
          <label>= Amount</label>
          <div id="t-pct-preview" style="padding:8px 10px;background:#0f1117;border:1px solid #2d3748;border-radius:6px;font-size:0.85rem;color:#4ade80;font-weight:600">—</div>
        </div>
      </div>
      <div style="text-align:center;margin-bottom:10px">
        <button type="button" onclick="switchToCustom()" style="background:none;border:none;color:#64748b;font-size:0.78rem;cursor:pointer;text-decoration:underline">or enter custom amount instead</button>
      </div>
    </div>
    <!-- Custom amount (default for deposit/bonus, optional for withdrawal) -->
    <div id="t-custom-row">
      <div class="form-row full">
        <div class="form-group">
          <label>Amount ($)</label>
          <input type="number" id="t-amount" min="0" step="0.01" placeholder="0.00" />
        </div>
      </div>
      <div id="t-custom-back" style="display:none;text-align:center;margin-bottom:10px">
        <button type="button" onclick="switchToPct()" style="background:none;border:none;color:#64748b;font-size:0.78rem;cursor:pointer;text-decoration:underline">or use % of balance instead</button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeTxnModal()">Cancel</button>
      <button class="btn-save" onclick="saveTxn()">Save</button>
    </div>
  </div>
</div>

<!-- Bet Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">Add Bet</h2>
    <div class="form-row">
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="f-date" />
      </div>
      <div class="form-group">
        <label>Site</label>
        <select id="f-site">
          <option>FanDuel</option>
          <option>DraftKings</option>
          <option>Kalshi</option>
          <option>Other</option>
        </select>
      </div>
    </div>
    <div class="form-row full">
      <div class="form-group">
        <label>Event</label>
        <input type="text" id="f-event" placeholder="e.g. France vs Iraq" />
      </div>
    </div>
    <div class="form-row full">
      <div class="form-group">
        <label>Bet Type</label>
        <input type="text" id="f-bettype" placeholder="e.g. France to win" />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Wager ($)</label>
        <input type="number" id="f-wager" min="0" step="0.01" placeholder="0.00" />
      </div>
      <div class="form-group">
        <label>Payout ($)</label>
        <input type="number" id="f-payout" min="0" step="0.01" placeholder="0.00" />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Status</label>
        <select id="f-status">
          <option value="Won">Won</option>
          <option value="Lost">Lost</option>
          <option value="Pending">Pending</option>
          <option value="Push">Push</option>
        </select>
      </div>
      <div class="form-group">
        <label>Bonus Bet?</label>
        <select id="f-bonus">
          <option value="no">No (Real Money)</option>
          <option value="yes">Yes (Bonus Bet)</option>
        </select>
      </div>
    </div>
    <div class="form-row full">
      <div class="form-group">
        <label>American Odds (optional — leave 0 to auto-calculate)</label>
        <input type="number" id="f-chance" step="1" placeholder="e.g. +150 or -200" />
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveBet()">Save Bet</button>
    </div>
  </div>
</div>

<script>
// ─── Data ────────────────────────────────────────────────────────────────────
// bonus: true = this wager was a bonus bet (doesn't count as real money spent)
let bets = JSON.parse(localStorage.getItem('bets') || 'null') || [
  { id:1, date:'2026-06-21', site:'FanDuel',    event:'France vs Iraq',        betType:'France to win',                    wager:5.00,  payout:5.33,  status:'Won',  bonus:false, chance:0 },
  { id:2, date:'2026-06-21', site:'DraftKings', event:'Egypt vs New Zealand',   betType:'2-0 correct score',                wager:5.00,  payout:0.00,  status:'Lost', bonus:false, chance:0 },
  { id:3, date:'2026-06-21', site:'DraftKings', event:'Argentina vs Austria',  betType:'Argentina to win',                 wager:25.00, payout:37.50, status:'Won',  bonus:true,  chance:0 },
  { id:4, date:'2026-06-21', site:'Kalshi',     event:'Egypt vs New Zealand',  betType:'Egypt to win',                    wager:10.00, payout:37.15, status:'Won',  bonus:false, chance:0 },
  { id:5, date:'2026-06-21', site:'Kalshi',     event:'Argentina vs Austria',  betType:'Argentina to win',                wager:37.15, payout:54.21, status:'Won',  bonus:false, chance:0 },
  { id:6, date:'2026-06-21', site:'Kalshi',     event:'Argentina vs Austria',  betType:'Argentina to win with over 1.5 goals', wager:15.00, payout:32.80, status:'Won', bonus:true,  chance:0 },
  { id:7, date:'2026-06-22', site:'FanDuel',    event:'Norway vs Senegal',     betType:'Norway to win',                   wager:50.00, payout:125.00,status:'Won',  bonus:true,  chance:0 },
  { id:8, date:'2026-06-22', site:'FanDuel',    event:'France vs Iraq',        betType:'Mbappe to have 1+ shots on target', wager:5.00, payout:5.20, status:'Won',  bonus:false, chance:0 },
  { id:9, date:'2026-06-22', site:'DraftKings', event:'Norway vs Senegal',     betType:'Senegal to win',                  wager:25.00, payout:0.00,  status:'Lost', bonus:true,  chance:0 },
  { id:10,date:'2026-06-22', site:'DraftKings', event:'Norway vs Senegal',     betType:'5 pick parlay',                   wager:25.00, payout:0.00,  status:'Lost', bonus:true,  chance:0 },
  { id:11,date:'2026-06-22', site:'Kalshi',     event:'France vs Iraq',        betType:'France to win',                   wager:38.48, payout:41.18, status:'Won',  bonus:false, chance:0 },
  { id:12,date:'2026-06-22', site:'Kalshi',     event:'France vs Iraq',        betType:'France 10+ corners',              wager:48.51, payout:2.99,  status:'Lost', bonus:false, chance:0 },
  { id:13,date:'2026-06-22', site:'Kalshi',     event:'France vs Iraq',        betType:'Tie',                             wager:19.99, payout:2.95,  status:'Lost', bonus:false, chance:0 },
  { id:14,date:'2026-06-22', site:'Kalshi',     event:'Jordan vs Algeria',     betType:'Algeria to win',                  wager:19.78, payout:35.92, status:'Won',  bonus:false, chance:0 },
];
let nextId = Math.max(...bets.map(b=>b.id)) + 1;

// Transactions: deposits, withdrawals, bonus credits per site
let txns = JSON.parse(localStorage.getItem('txns') || 'null') || [
  { id:1, date:'2026-06-21', site:'FanDuel',    type:'deposit',    amount:5.00  },
  { id:2, date:'2026-06-21', site:'DraftKings', type:'deposit',    amount:5.00  },
  { id:3, date:'2026-06-21', site:'Kalshi',     type:'deposit',    amount:10.00 },
  { id:4, date:'2026-06-22', site:'FanDuel',    type:'withdrawal', amount:0     },
];
let nextTxnId = Math.max(...txns.map(t=>t.id)) + 1;

const REAL_MONEY_INPUT = 25;
const TOTAL_BONUS = 265;
const BONUS_REMAINING = 125;

function save() { localStorage.setItem('bets', JSON.stringify(bets)); }
function saveTxns() { localStorage.setItem('txns', JSON.stringify(txns)); }

// ─── Derived stats ────────────────────────────────────────────────────────────
function netProfit(b) {
  // Bonus bets cost nothing — profit is just the payout received
  if (b.status === 'Pending') return null;
  if (b.status === 'Push') return 0;
  if (b.bonus) return b.payout;
  return b.payout - b.wager;
}

function hypotheticalProfit(b) {
  // As-if-real: always payout - wager
  if (b.status === 'Pending') return null;
  if (b.status === 'Push') return 0;
  return b.payout - b.wager;
}

function americanOdds(b) {
  // manual override stored as American odds (e.g. 150 or -200)
  if (b.chance && b.chance !== 0) return b.chance;
  if (b.payout > 0 && b.wager > 0 && b.status !== 'Pending') {
    const dec = b.payout / b.wager; // decimal odds
    if (dec >= 2) return Math.round((dec - 1) * 100);   // positive (underdog)
    else return Math.round(-100 / (dec - 1));             // negative (favorite)
  }
  return null;
}

function oddsToImpliedPct(odds) {
  if (odds === null) return null;
  if (odds < 0) return (-odds) / (-odds + 100) * 100;
  return 100 / (odds + 100) * 100;
}

function computeStats() {
  const settled = bets.filter(b => b.status !== 'Pending');
  const won = settled.filter(b => b.status === 'Won').length;
  const totalBets = settled.length;
  const winRate = totalBets ? (won / totalBets * 100).toFixed(1) : 0;

  // Real money wagered (non-bonus bets, settled)
  const realWagered = settled.filter(b=>!b.bonus).reduce((s,b)=>s+b.wager,0);
  // Bonus wagered
  const bonusWagered = settled.filter(b=>b.bonus).reduce((s,b)=>s+b.wager,0);

  // Real P&L: real bets only (payout - wager); bonus losses = $0, bonus wins = payout - wager
  const realNetProfit  = settled.filter(b=>!b.bonus).reduce((s,b)=>s+(netProfit(b)||0),0);
  const bonusNetProfit = settled.filter(b=> b.bonus).reduce((s,b)=>s+(netProfit(b)||0),0);
  const totalProfit    = realNetProfit + bonusNetProfit;

  // Hypothetical P&L: treats every bet as real money (for performance benchmarking)
  const hypTotalProfit = settled.reduce((s,b)=>s+(hypotheticalProfit(b)||0),0);

  const totalInvested = REAL_MONEY_INPUT + (TOTAL_BONUS - BONUS_REMAINING);
  const roi    = (totalProfit    / totalInvested * 100).toFixed(1);
  const hypRoi = (hypTotalProfit / totalInvested * 100).toFixed(1);

  const totalWagered = settled.reduce((s,b) => s + b.wager, 0);

  // Average odds across all settled bets
  const oddsArr = settled.map(b => americanOdds(b)).filter(o => o !== null);
  const avgOdds = oddsArr.length ? Math.round(oddsArr.reduce((s,o)=>s+o,0) / oddsArr.length) : null;

  // Biggest win / loss (real P&L)
  const profits = settled.map(b => netProfit(b) || 0);
  const biggestWin  = profits.length ? Math.max(...profits) : 0;
  const biggestLoss = profits.length ? Math.min(...profits) : 0;

  // P&L by site
  const sites = [...new Set(bets.map(b => b.site))];
  const bysite = {};
  for (const site of sites) {
    const sb = settled.filter(b => b.site === site);
    const sw = sb.filter(b => b.status === 'Won').length;
    const pnl = sb.reduce((s,b) => s + (netProfit(b)||0), 0);
    // expected balance = deposits + bonuses - withdrawals + bet net (real wagers out, payouts in)
    const siteTxns = txns.filter(t => t.site === site);
    const deposits  = siteTxns.filter(t=>t.type==='deposit').reduce((s,t)=>s+t.amount,0);
    const bonusCr   = siteTxns.filter(t=>t.type==='bonus').reduce((s,t)=>s+t.amount,0);
    const withdrawn = siteTxns.filter(t=>t.type==='withdrawal').reduce((s,t)=>s+t.amount,0);
    const realOut   = sb.filter(b=>!b.bonus).reduce((s,b)=>s+b.wager,0);
    const payouts   = sb.reduce((s,b)=>s+b.payout,0);
    const balance   = deposits + bonusCr - withdrawn - realOut + payouts;
    bysite[site] = { pnl, won: sw, total: sb.length, balance, withdrawn };
  }

  return { won, totalBets, winRate, realNetProfit, bonusNetProfit, totalProfit, hypTotalProfit, realWagered, bonusWagered, roi, hypRoi, totalInvested, totalWagered, avgOdds, biggestWin, biggestLoss, bysite };
}

// ─── Render ───────────────────────────────────────────────────────────────────
function siteClass(site) {
  if (site === 'FanDuel') return 'site-fanduel';
  if (site === 'DraftKings') return 'site-draftkings';
  if (site === 'Kalshi') return 'site-kalshi';
  return '';
}

function fmtMoney(v) {
  if (v === null) return '—';
  const abs = Math.abs(v).toFixed(2);
  return v < 0 ? `-$${abs}` : `$${v.toFixed(2)}`;
}

function render() {
  const stats = computeStats();

  // Stats cards
  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card">
      <div class="label">Record</div>
      <div class="value blue">${stats.won}–${stats.totalBets - stats.won}</div>
      <div class="sub">${stats.winRate}% win rate</div>
    </div>
    <div class="stat-card">
      <div class="label">Real Money In</div>
      <div class="value yellow">$${REAL_MONEY_INPUT.toFixed(2)}</div>
      <div class="sub">Actual cash deposited</div>
    </div>
    <div class="stat-card">
      <div class="label">Bonus Remaining</div>
      <div class="value yellow">$${BONUS_REMAINING.toFixed(2)}</div>
      <div class="sub">$${stats.bonusWagered.toFixed(2)} used of $${TOTAL_BONUS.toFixed(2)}</div>
    </div>
    <div class="stat-card">
      <div class="label">Total P&L</div>
      <div class="value ${stats.totalProfit >= 0 ? 'green':'red'}">${fmtMoney(stats.totalProfit)}</div>
      <div class="sub">Real cash + bonus winnings</div>
    </div>
    <div class="stat-card">
      <div class="label">Hypothetical P&L</div>
      <div class="value ${stats.hypTotalProfit >= 0 ? 'green':'red'}">${fmtMoney(stats.hypTotalProfit)}</div>
      <div class="sub">If all bets were real money</div>
    </div>
    <div class="stat-card">
      <div class="label">ROI (if real)</div>
      <div class="value ${parseFloat(stats.hypRoi) >= 0 ? 'green':'red'}">${stats.hypRoi}%</div>
      <div class="sub">Actual: <span style="color:${parseFloat(stats.roi)>=0?'#22c55e':'#ef4444'};font-weight:600">${stats.roi}%</span></div>
    </div>
    <div class="stat-card">
      <div class="label">Units Wagered</div>
      <div class="value blue">$${stats.totalWagered.toFixed(2)}</div>
      <div class="sub">Total staked (all bets)</div>
    </div>
    <div class="stat-card">
      <div class="label">Avg Odds</div>
      <div class="value ${stats.avgOdds === null ? 'blue' : stats.avgOdds > 0 ? 'yellow' : 'blue'}">${stats.avgOdds === null ? '—' : stats.avgOdds > 0 ? '+'+stats.avgOdds : stats.avgOdds}</div>
      <div class="sub">${stats.avgOdds !== null && stats.avgOdds > 0 ? 'Underdog lean' : stats.avgOdds !== null ? 'Favorite lean' : ''}</div>
    </div>
    <div class="stat-card">
      <div class="label">Biggest Win</div>
      <div class="value green">${fmtMoney(stats.biggestWin)}</div>
      <div class="sub">Single bet</div>
    </div>
    <div class="stat-card">
      <div class="label">Biggest Loss</div>
      <div class="value red">${fmtMoney(stats.biggestLoss)}</div>
      <div class="sub">Single bet</div>
    </div>
  `;

  // Site breakdown
  const siteColors = { FanDuel: '#60a5fa', DraftKings: '#4ade80', Kalshi: '#c084fc' };
  let siteHtml = Object.entries(stats.bysite).map(([site, s]) => {
    const balClass = s.balance >= 0 ? 'balance-pos' : 'balance-neg';
    const hasDeposit = txns.some(t => t.site === site && t.type === 'deposit');
    const balValue = hasDeposit ? fmtMoney(s.balance) : '—';
    const balColor = s.balance >= 0 ? 'green' : 'red';
    const withdrawnNote = s.withdrawn > 0 ? ` · withdrew ${fmtMoney(s.withdrawn)}` : '';
    const noDepositNote = !hasDeposit ? `<div class="sub" style="color:#f59e0b">Add a deposit to see balance</div>` : '';
    return `<div class="stat-card" style="border-left: 3px solid ${siteColors[site] || '#64748b'}">
      <div class="label">${site} — Est. Balance</div>
      <div class="value ${balColor}">${balValue}</div>
      <div class="sub"><span style="color:${s.pnl>=0?'#22c55e':'#ef4444'};font-weight:600">${fmtMoney(s.pnl)} P&amp;L</span> · ${s.won}–${s.total - s.won} (${s.total ? (s.won/s.total*100).toFixed(0) : 0}% win)${withdrawnNote}</div>
      ${noDepositNote}
    </div>`;
  }).join('');
  document.getElementById('siteGrid').innerHTML = siteHtml;

  // Render transactions table
  const txnSorted = [...txns].sort((a,b) => b.date.localeCompare(a.date));
  document.getElementById('txnBody').innerHTML = txnSorted.length ? txnSorted.map(t => `
    <tr>
      <td>${t.date}</td>
      <td><span class="site-badge ${siteClass(t.site)}">${t.site}</span></td>
      <td><span class="txn-type txn-${t.type}">${t.type.charAt(0).toUpperCase()+t.type.slice(1)}</span></td>
      <td class="${t.type==='withdrawal'?'profit neg':'profit pos'}">${t.type==='withdrawal'?'-':'+'} $${t.amount.toFixed(2)}</td>
      <td style="white-space:nowrap">
        <button class="edit-btn" onclick="editTxn(${t.id})" title="Edit">✎</button>
        <button class="delete-btn" onclick="deleteTxn(${t.id})" title="Delete">✕</button>
      </td>
    </tr>`).join('') : `<tr><td colspan="5" style="color:#475569;padding:16px 14px;font-size:0.85rem">No transactions yet — add deposits to see expected balances.</td></tr>`;

  document.getElementById('roiExplainer').innerHTML = `
    <strong>ROI note:</strong> You put in <strong>$${REAL_MONEY_INPUT}</strong> real cash and have used <strong>$${(TOTAL_BONUS - BONUS_REMAINING).toFixed(2)}</strong> of $${TOTAL_BONUS} in bonus bets ($${BONUS_REMAINING} remaining).
    ROI = (all net profit) ÷ $${stats.totalInvested.toFixed(2)} total invested (cash + bonus used).
    Bonus bet losses show $0 lost (you never spent real cash), but wins add real profit.
  `;

  // Group by date
  const grouped = {};
  [...bets].sort((a,b)=>b.date.localeCompare(a.date)).forEach(b => {
    if (!grouped[b.date]) grouped[b.date] = [];
    grouped[b.date].push(b);
  });

  let html = '';
  for (const [date, rows] of Object.entries(grouped)) {
    html += `<tr><td colspan="10" class="section-header">${date}</td></tr>`;
    for (const b of rows) {
      const np = netProfit(b);
      const hyp = hypotheticalProfit(b);
      const showHyp = b.bonus && hyp !== null;
      const npStr = np === null ? '—' : fmtMoney(np);
      const npClass = np === null ? '' : np >= 0 ? 'pos' : 'neg';
      const hypStr = showHyp ? `<span style="color:${hyp>=0?'#4ade8088':'#f8717188'};font-size:0.72rem;margin-left:4px">(${fmtMoney(hyp)} real)</span>` : '';
      const odds = americanOdds(b);
      let chanceHtml = '—';
      if (odds !== null) {
        const pct = oddsToImpliedPct(odds);
        const clamp = Math.min(100, Math.max(0, pct));
        const color = clamp > 60 ? '#22c55e' : clamp > 40 ? '#f59e0b' : '#ef4444';
        const oddsStr = odds > 0 ? `+${odds}` : `${odds}`;
        chanceHtml = `<div class="chance-bar">
          <div class="bar-bg"><div class="bar-fill" style="width:${clamp}%;background:${color}"></div></div>
          <span class="chance-label" style="color:${color};font-weight:600;width:52px">${oddsStr}</span>
        </div>`;
      }
      html += `<tr>
        <td>${b.date}</td>
        <td><span class="site-badge ${siteClass(b.site)}">${b.site}</span></td>
        <td>${b.event}</td>
        <td>${b.betType}</td>
        <td class="wager-cell">$${b.wager.toFixed(2)}${b.bonus ? '<span class="wager-bonus">bonus bet</span>' : ''}</td>
        <td>$${b.payout.toFixed(2)}</td>
        <td><span class="badge ${b.status.toLowerCase()}">${b.status}</span></td>
        <td class="profit ${npClass}">${npStr}${hypStr}</td>
        <td>${chanceHtml}</td>
        <td style="white-space:nowrap">
          <button class="edit-btn" onclick="editBet(${b.id})" title="Edit">✎</button>
          <button class="delete-btn" onclick="deleteBet(${b.id})" title="Delete">✕</button>
        </td>
      </tr>`;
    }
  }
  document.getElementById('betsBody').innerHTML = html;
}

function deleteBet(id) {
  if (!confirm('Delete this bet?')) return;
  bets = bets.filter(b => b.id !== id);
  save();
  render();
}

// ─── Transaction Modal ────────────────────────────────────────────────────────
let editingTxnId = null;
let txnUseCustom = false;

function getSiteBalance(site) {
  const settled = bets.filter(b => b.status !== 'Pending' && b.site === site);
  const siteTxns = txns.filter(t => t.site === site && t.id !== editingTxnId);
  const deposits  = siteTxns.filter(t=>t.type==='deposit').reduce((s,t)=>s+t.amount,0);
  const bonusCr   = siteTxns.filter(t=>t.type==='bonus').reduce((s,t)=>s+t.amount,0);
  const withdrawn = siteTxns.filter(t=>t.type==='withdrawal').reduce((s,t)=>s+t.amount,0);
  const realOut   = settled.filter(b=>!b.bonus).reduce((s,b)=>s+b.wager,0);
  const payouts   = settled.reduce((s,b)=>s+b.payout,0);
  return deposits + bonusCr - withdrawn - realOut + payouts;
}

function updateTxnAmountUI() {
  const type = document.getElementById('t-type').value;
  const isWithdrawal = type === 'withdrawal';
  txnUseCustom = !isWithdrawal;
  document.getElementById('t-pct-row').style.display    = isWithdrawal && !txnUseCustom ? '' : 'none';
  document.getElementById('t-custom-row').style.display = txnUseCustom ? '' : 'none';
  document.getElementById('t-custom-back').style.display = isWithdrawal && txnUseCustom ? '' : 'none';
  if (isWithdrawal && !txnUseCustom) updatePctPreview();
}

function updatePctPreview() {
  const site = document.getElementById('t-site').value;
  const pct  = parseFloat(document.getElementById('t-pct').value) || 0;
  const bal  = getSiteBalance(site);
  const amt  = bal * (pct / 100);
  document.getElementById('t-pct-preview').textContent = amt > 0 ? `$${amt.toFixed(2)}` : '—';
}

function switchToCustom() {
  txnUseCustom = true;
  document.getElementById('t-pct-row').style.display    = 'none';
  document.getElementById('t-custom-row').style.display = '';
  document.getElementById('t-custom-back').style.display = '';
  document.getElementById('t-amount').value = '';
}

function switchToPct() {
  txnUseCustom = false;
  document.getElementById('t-pct-row').style.display    = '';
  document.getElementById('t-custom-row').style.display = 'none';
  document.getElementById('t-custom-back').style.display = 'none';
  document.getElementById('t-pct').value = '';
  updatePctPreview();
}

function openTxnModal() {
  editingTxnId = null;
  txnUseCustom = false;
  document.getElementById('txnModalTitle').textContent = 'Add Transaction';
  document.getElementById('t-date').value = new Date().toISOString().slice(0,10);
  document.getElementById('t-site').value = 'FanDuel';
  document.getElementById('t-type').value = 'deposit';
  document.getElementById('t-amount').value = '';
  document.getElementById('t-pct').value = '';
  updateTxnAmountUI();
  document.getElementById('txnModalOverlay').classList.add('open');
}

function editTxn(id) {
  const t = txns.find(x => x.id === id);
  if (!t) return;
  editingTxnId = id;
  txnUseCustom = true;
  document.getElementById('txnModalTitle').textContent = 'Edit Transaction';
  document.getElementById('t-date').value   = t.date;
  document.getElementById('t-site').value   = t.site;
  document.getElementById('t-type').value   = t.type;
  document.getElementById('t-amount').value = t.amount;
  document.getElementById('t-pct').value    = '';
  updateTxnAmountUI();
  // For withdrawals in edit mode, force custom so the saved value is visible
  if (t.type === 'withdrawal') {
    txnUseCustom = true;
    document.getElementById('t-pct-row').style.display    = 'none';
    document.getElementById('t-custom-row').style.display = '';
    document.getElementById('t-custom-back').style.display = '';
  }
  document.getElementById('txnModalOverlay').classList.add('open');
}

function closeTxnModal() {
  document.getElementById('txnModalOverlay').classList.remove('open');
  editingTxnId = null;
}

function saveTxn() {
  const type = document.getElementById('t-type').value;
  let amount;
  if (type === 'withdrawal' && !txnUseCustom) {
    const site = document.getElementById('t-site').value;
    const pct  = parseFloat(document.getElementById('t-pct').value) || 0;
    if (!pct) { alert('Enter a percentage.'); return; }
    amount = getSiteBalance(site) * (pct / 100);
  } else {
    amount = parseFloat(document.getElementById('t-amount').value) || 0;
    if (!amount) { alert('Enter an amount.'); return; }
  }
  const fields = {
    date:   document.getElementById('t-date').value,
    site:   document.getElementById('t-site').value,
    type,
    amount: parseFloat(amount.toFixed(2)),
  };
  if (editingTxnId !== null) {
    txns = txns.map(t => t.id === editingTxnId ? { ...t, ...fields } : t);
  } else {
    txns.push({ id: nextTxnId++, ...fields });
  }
  saveTxns();
  render();
  closeTxnModal();
}

function deleteTxn(id) {
  if (!confirm('Delete this transaction?')) return;
  txns = txns.filter(t => t.id !== id);
  saveTxns();
  render();
}

document.getElementById('txnModalOverlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeTxnModal();
});

// ─── Bet Modal ────────────────────────────────────────────────────────────────
let editingId = null;

function openModal() {
  editingId = null;
  document.getElementById('modalTitle').textContent = 'Add Bet';
  document.getElementById('f-date').value = new Date().toISOString().slice(0,10);
  document.getElementById('f-site').value = 'FanDuel';
  document.getElementById('f-event').value = '';
  document.getElementById('f-bettype').value = '';
  document.getElementById('f-wager').value = '';
  document.getElementById('f-payout').value = '';
  document.getElementById('f-status').value = 'Won';
  document.getElementById('f-bonus').value = 'no';
  document.getElementById('f-chance').value = '';
  document.getElementById('modalOverlay').classList.add('open');
}

function editBet(id) {
  const b = bets.find(x => x.id === id);
  if (!b) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = 'Edit Bet';
  document.getElementById('f-date').value = b.date;
  document.getElementById('f-site').value = b.site;
  document.getElementById('f-event').value = b.event;
  document.getElementById('f-bettype').value = b.betType;
  document.getElementById('f-wager').value = b.wager;
  document.getElementById('f-payout').value = b.payout;
  document.getElementById('f-status').value = b.status;
  document.getElementById('f-bonus').value = b.bonus ? 'yes' : 'no';
  document.getElementById('f-chance').value = b.chance || '';
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  editingId = null;
}

function saveBet() {
  const fields = {
    date: document.getElementById('f-date').value,
    site: document.getElementById('f-site').value,
    event: document.getElementById('f-event').value.trim(),
    betType: document.getElementById('f-bettype').value.trim(),
    wager: parseFloat(document.getElementById('f-wager').value) || 0,
    payout: parseFloat(document.getElementById('f-payout').value) || 0,
    status: document.getElementById('f-status').value,
    bonus: document.getElementById('f-bonus').value === 'yes',
    chance: parseFloat(document.getElementById('f-chance').value) || 0,
  };
  if (!fields.date || !fields.event || !fields.wager) { alert('Fill in date, event, and wager.'); return; }
  if (editingId !== null) {
    bets = bets.map(b => b.id === editingId ? { ...b, ...fields } : b);
  } else {
    bets.push({ id: nextId++, ...fields });
  }
  save();
  render();
  closeModal();
}

document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

render();
</script>
</body>
</html>
